name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write   # necessário para autenticação via Workload Identity Federation

env:
  REGION: us-central1
  REPOSITORIO: bloco-notas
  SERVICO: bloco-notas
  IMAGEM: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bloco-notas/app

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências (incluindo as de teste)
        run: pip install -r requirements-dev.txt

      - name: Verificar estilo e qualidade do código (Ruff)
        run: ruff check .

      - name: Verificar formatação do código (Ruff)
        run: ruff format --check .

      - name: Rodar testes automatizados
        env:
          DJANGO_SECRET_KEY: chave-de-teste-nao-usar-em-producao
        run: pytest -v

      - name: Verificar configuração do Django
        env:
          DJANGO_SECRET_KEY: chave-de-teste-nao-usar-em-producao
        run: python manage.py check

  # ---------------------------------------------------------------
  # CD: só roda em push para main, e só se "test" tiver passado.
  # Usa Workload Identity Federation: nenhuma chave de service account
  # fica armazenada como secret.
